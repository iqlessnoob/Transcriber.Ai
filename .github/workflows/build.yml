name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Memory limit to prevent Java heap space errors
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Generate missing Android folder
      run: flutter create --platforms=android .

    - name: Install dependencies
      run: flutter pub get

    - name: Fix App and Plugin SDK Versions
      run: |
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        
        # 1. Update your app's build files
        find android -type f -name "build.gradle*" -exec sed -i 's/flutter.compileSdkVersion/36/g' {} +
        find android -type f -name "build.gradle*" -exec sed -i 's/flutter.targetSdkVersion/36/g' {} +
        
        # 2. OVERRIDE THE EXTERNAL PLUGINS
        # This targets the hidden pub-cache folder and upgrades all hardcoded plugin SDKs to 36
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk 33/compileSdk 36/g' {} +
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk 34/compileSdk 36/g' {} +
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk 35/compileSdk 36/g' {} +
        
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk = 33/compileSdk = 36/g' {} +
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk = 34/compileSdk = 36/g' {} +
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdk = 35/compileSdk = 36/g' {} +
        
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 36/g' {} +
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdkVersion 34/compileSdkVersion 36/g' {} +
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/compileSdkVersion 35/compileSdkVersion 36/g' {} +
        
        find ~/.pub-cache/hosted/ -type f -name "build.gradle*" -exec sed -i 's/flutter.compileSdkVersion/36/g' {} +

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
