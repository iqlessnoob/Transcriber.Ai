name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Increase memory limit for Gradle to fix Java heap space errors
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Generate missing Android folder
      run: flutter create --platforms=android .

    - name: Install dependencies
      run: flutter pub get

    - name: Configure AndroidX and SDK
      run: |
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle || true
        sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle || true

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

