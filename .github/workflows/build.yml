name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Generate missing Android folder
      run: flutter create --platforms=android .

    - name: Install dependencies
      run: flutter pub get

    - name: Force Android SDK 36
      run: |
        # Use find to locate the build.gradle file and replace the compileSdk line
        find . -name "build.gradle" -exec sed -i 's/compileSdk = .*/compileSdk = 36/g' {} +
        find . -name "build.gradle" -exec sed -i 's/compileSdkVersion = .*/compileSdkVersion = 36/g' {} +

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

