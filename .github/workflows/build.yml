name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Generate missing Android folder
      run: flutter create --platforms=android .

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      # We pass the compileSdkVersion directly as a Gradle property
      run: flutter build apk --release --build-name=1.0.0 --build-number=1 --no-tree-shake-icons -PcompileSdkVersion=36

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
