name: transcriber_ai
description: An offline Speech-to-Text Flutter app using sherpa-onnx.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # AI Engine
  sherpa_onnx: ^1.13.2

  # Audio extraction and chunking
  ffmpeg_kit_flutter: ^6.0.3

  # Network & Files for downloading the AI Engine
  dio: ^5.4.3
  path_provider: ^2.1.3

  # UI and Utilities
  file_picker: ^8.0.3
  share_plus: ^10.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

